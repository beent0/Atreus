version: '3.8'

services:
  atreus:
    # Replace <your-github-username> and <your-repo-name> with your GitHub information
    image: ghcr.io/<your-github-username>/<your-repo-name>:latest
    container_name: atreus
    ports:
      - "8000:8000"
    environment:
      - COUCHDB_URL=http://admin:adminpassword@couchdb:5984
    extra_hosts:
      # Maps host.docker.internal to host's network adapter gateway IP
      # This allows the container to talk to Ollama running directly on host machine (port 11434)
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    depends_on:
      - couchdb

  couchdb:
    image: couchdb:3.3
    container_name: atreus-couchdb
    ports:
      - "5984:5984"
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpassword
    volumes:
      # Persists CouchDB database files on the ZimaOS host
      - ./couchdb-data:/opt/couchdb/data
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower
    container_name: atreus-watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    # Check for image updates every 10 minutes (600 seconds) and clean up old images
    command: --interval 600 --cleanup
    restart: unless-stopped
