version: '3.8'

services:
  atreus:
    image: ghcr.io/beent0/atreus:latest
    container_name: atreus
    ports:
      - "8000:8000"
    environment:
      # Change this URL to connect to your existing CouchDB container
      # If CouchDB is exposed on your ZimaOS host on port 5984, you can use:
      # http://your-couchdb-username:your-couchdb-password@host.docker.internal:5984
      - COUCHDB_URL=http://admin:adminpassword@host.docker.internal:5984
    extra_hosts:
      # Maps host.docker.internal to host's network adapter gateway IP
      # This allows the container to talk to services on the host (like CouchDB or Ollama)
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
